<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hangman</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

 

  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
        <div id="difficultyPopup" class="popup-overlay">
  <div class="popup-box">
    <h2>Choose a Difficulty</h2>
    <div class="popup-buttons">
      <button class="btn btn-success" onclick="selectDifficulty('easy')">Easy</button>
      <button class="btn btn-warning" onclick="selectDifficulty('medium')">Medium</button>
      <button class="btn btn-danger" onclick="selectDifficulty('hard')">Hard</button>
    </div>
  </div>
</div>

      <div class="game-card text-center p-4">
        <h1 class="title mb-4">Hangman</h1>

        <h2 id="wordDisplay" class="word-display">_ _ _ _</h2>

        <div class="info mt-4">
          <p class="lives">Lives: <span id="lives"></span></p>

          <p class="wrong">Guessed Letters: <span id="guessedLetters"></span></p>
        </div>

        <input
          type="text"
          id="letterInput"
          maxlength="1"
          class="form-control guess-box mx-auto mt-3"
          placeholder="Guess..."
        />

      <button onclick="submitGuess()" class="btn btn-primary guess-btn mx-auto mt-3 d-block">Guess</button>
      <button onclick="restartGame()" class="btn btn-secondary mx-auto mt-3 d-block">Reset</button>

      
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
